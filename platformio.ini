[env:giga_r1_m7]
platform = ststm32
board = giga_r1_m7
framework = arduino
monitor_dtr = 1
monitor_rts = 1
lib_deps = 
    SD
    arduino-libraries/Arduino_AdvancedAnalog@^1.5.0
; extra_scripts = pre:scripts/prebuild.py